<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenoSQL-AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e0f;
            --surface: #0f1518;
            --border: #1e2d2f;
            --border-lit: #2e4a4e;
            --accent: #00c896;
            --accent-dim: #007a5c;
            --accent-glow: rgba(0, 200, 150, 0.12);
            --muted: #3a5055;
            --text: #c8dde0;
            --text-dim: #6a8a90;
            --text-bright: #eaf5f7;
            --red: #ff5f5f;
            --yellow: #f0c060;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── NOISE OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ── LAYOUT ── */
        .shell {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── HEADER ── */
        header {
            padding: 32px 0 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .logo {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text-dim);
            font-weight: 300;
        }

        .tagline {
            font-size: 12px;
            color: var(--text-dim);
            font-family: var(--mono);
            letter-spacing: 0.05em;
        }

        .status-dot {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
        }

        .dot.online {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── MAIN BODY ── */
        main {
            padding: 32px 0 48px;
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: auto 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── QUERY PANEL ── */
        .query-panel {
            grid-column: 1;
            grid-row: 1;
        }

        .panel-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .query-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .query-box:focus-within {
            border-color: var(--border-lit);
            box-shadow: 0 0 0 1px var(--accent-dim), 0 0 20px var(--accent-glow);
        }

        .query-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-bright);
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 300;
            padding: 16px 18px 12px;
            resize: none;
            min-height: 72px;
            line-height: 1.5;
        }

        .query-input::placeholder {
            color: var(--muted);
        }

        .query-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 10px;
            border-top: 1px solid var(--border);
        }

        .hint {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
        }

        .submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 3px;
            padding: 7px 18px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.15s, transform 0.1s;
        }

        .submit-btn:hover {
            opacity: 0.85;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ── SQL DISPLAY ── */
        .sql-display {
            margin-top: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .sql-display.visible {
            display: block;
        }

        .sql-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .sql-bar-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 2px;
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid var(--accent-dim);
        }

        .badge.warn {
            background: rgba(240, 192, 96, 0.1);
            color: var(--yellow);
            border-color: rgba(240, 192, 96, 0.3);
        }

        .sql-code {
            padding: 14px 16px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.7;
        }

        /* ── RESULTS PANEL ── */
        .results-panel {
            grid-column: 1;
            grid-row: 2;
        }

        .results-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .row-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .row-count strong {
            color: var(--accent);
        }

        /* ── TABLE ── */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 12px;
        }

        thead {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-lit);
        }

        th {
            padding: 10px 14px;
            text-align: left;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 10px;
            white-space: nowrap;
        }

        td {
            padding: 9px 14px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: rgba(0, 200, 150, 0.04);
        }

        /* Highlight chrom column */
        td:first-child {
            color: var(--accent);
            font-weight: 500;
        }

        /* ── EMPTY / ERROR STATES ── */
        .state-box {
            padding: 48px 24px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: none;
        }

        .state-box.visible {
            display: block;
        }

        .state-icon {
            font-size: 28px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .state-msg {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        .state-msg.error {
            color: var(--red);
        }

        /* ── LOADING ── */
        .loading-bar {
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
            display: none;
            margin-bottom: 16px;
        }

        .loading-bar.visible {
            display: block;
        }

        .loading-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 40%;
            background: var(--accent);
            animation: scan 1.2s ease-in-out infinite;
            border-radius: 1px;
        }

        @keyframes scan {
            0% {
                transform: translateX(-150%);
            }

            100% {
                transform: translateX(400%);
            }
        }

        /* ── SIDEBAR: HISTORY ── */
        .sidebar {
            grid-column: 2;
            grid-row: 1 / 3;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .history-item:hover {
            border-color: var(--border-lit);
            background: rgba(0, 200, 150, 0.03);
        }

        .history-q {
            font-size: 12px;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .history-sql {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-empty {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            padding: 24px 0;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ── FADE IN ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeUp 0.25s ease forwards;
        }
    </style>
</head>

<body>
    <div class="shell">

        <header>
            <div class="logo">GenoSQL<span>-AI</span></div>
            <div class="tagline">natural language → genomic SQL</div>
            <div class="status-dot">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">checking...</span>
            </div>
        </header>

        <main>

            <!-- ── QUERY PANEL ── -->
            <section class="query-panel">
                <div class="panel-label">Query</div>
                <div class="query-box">
                    <textarea class="query-input" id="queryInput"
                        placeholder="e.g. variants on chromosome 22 with quality above 30" rows="3"></textarea>
                    <div class="query-footer">
                        <span class="hint">↵ Enter to submit</span>
                        <button class="submit-btn" id="submitBtn">RUN →</button>
                    </div>
                </div>

                <!-- Generated SQL -->
                <div class="sql-display" id="sqlDisplay">
                    <div class="sql-bar">
                        <span class="sql-bar-label">Generated SQL</span>
                        <span class="badge" id="examplesBadge"></span>
                    </div>
                    <div class="sql-code" id="sqlCode"></div>
                </div>
            </section>

            <!-- ── RESULTS ── -->
            <section class="results-panel">
                <div class="loading-bar" id="loadingBar"></div>

                <!-- Empty prompt -->
                <div class="state-box visible" id="emptyState">
                    <div class="state-icon">⬡</div>
                    <div class="state-msg">Ask a question about your genomic data</div>
                </div>

                <!-- Error -->
                <div class="state-box" id="errorState">
                    <div class="state-icon">⚠</div>
                    <div class="state-msg error" id="errorMsg"></div>
                </div>

                <!-- Results table -->
                <div id="resultsContainer" style="display:none">
                    <div class="results-meta">
                        <div class="panel-label" style="margin:0">Results</div>
                        <div class="row-count" id="rowCount"></div>
                    </div>
                    <div class="table-wrap">
                        <table id="resultsTable">
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- ── SIDEBAR ── -->
            <aside class="sidebar">
                <div class="panel-label">History</div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">No queries yet</div>
                </div>
            </aside>

        </main>
    </div>

    <script>
        // ── CONFIG ──
        const API_BASE = '';

        // ── STATE ──
        const history = [];   // { question, sql, rowCount }

        // ── ELEMENTS ──
        const queryInput = document.getElementById('queryInput');
        const submitBtn = document.getElementById('submitBtn');
        const sqlDisplay = document.getElementById('sqlDisplay');
        const sqlCode = document.getElementById('sqlCode');
        const examplesBadge = document.getElementById('examplesBadge');
        const loadingBar = document.getElementById('loadingBar');
        const emptyState = document.getElementById('emptyState');
        const errorState = document.getElementById('errorState');
        const errorMsg = document.getElementById('errorMsg');
        const resultsContainer = document.getElementById('resultsContainer');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const rowCount = document.getElementById('rowCount');
        const historyList = document.getElementById('historyList');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ── HEALTH CHECK ──
        // On page load, ping the backend so the status dot reflects real connectivity
        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/`);
                if (res.ok) {
                    statusDot.classList.add('online');
                    statusText.textContent = 'connected';
                } else {
                    throw new Error();
                }
            } catch {
                statusDot.style.background = 'var(--red)';
                statusText.textContent = 'offline';
            }
        }

        // ── SHOW / HIDE HELPERS ──
        function showState(state) {
            emptyState.classList.remove('visible');
            errorState.classList.remove('visible');
            resultsContainer.style.display = 'none';
            if (state === 'empty') emptyState.classList.add('visible');
            if (state === 'error') errorState.classList.add('visible');
            if (state === 'results') resultsContainer.style.display = 'block';
        }

        // ── RENDER TABLE ──
        // Takes the columns array and rows array from the API response
        // and builds an HTML table dynamically
        function renderTable(results) {
            if (results.length === 0) {
                showState('error');
                errorMsg.textContent = 'Query returned no rows.';
                errorMsg.classList.remove('error');
                return;
            }

            const columns = Object.keys(results[0]);

            // Build header row
            tableHead.innerHTML = '<tr>' +
                columns.map(col => `<th>${col}</th>`).join('') +
                '</tr>';

            // Build data rows
            tableBody.innerHTML = results.map(row =>
                '<tr>' +
                columns.map(col => {
                    const val = row[col] ?? '—';
                    return `<td>${val}</td>`;
                }).join('') +
                '</tr>'
            ).join('');

            rowCount.innerHTML = `<strong>${results.length}</strong> rows returned`;
            showState('results');
            resultsContainer.classList.add('fade-in');
        }

        // ── ADD TO HISTORY ──
        function addToHistory(question, sql, count) {
            history.unshift({ question, sql, count });

            // Remove the "no queries yet" placeholder if present
            const empty = historyList.querySelector('.history-empty');
            if (empty) empty.remove();

            const item = document.createElement('div');
            item.className = 'history-item fade-in';
            item.innerHTML = `
      <div class="history-q">${question}</div>
      <div class="history-sql">${sql}</div>
    `;

            // Clicking a history item re-fills the query box
            item.addEventListener('click', () => {
                queryInput.value = question;
                queryInput.focus();
            });

            historyList.prepend(item);
        }

        // ── MAIN QUERY FUNCTION ──
        async function runQuery() {
            const question = queryInput.value.trim();
            if (!question) return;

            // UI: loading state
            submitBtn.disabled = true;
            submitBtn.textContent = '...';
            loadingBar.classList.add('visible');
            sqlDisplay.classList.remove('visible');
            showState('empty');

            try {
                const res = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await res.json();

                // Always show the generated SQL, even on error
                if (data.sql) {
                    sqlCode.textContent = data.sql;
                    examplesBadge.textContent = `${data.examples_used ?? 0} examples used`;
                    examplesBadge.className = data.examples_used > 0 ? 'badge' : 'badge warn';
                    sqlDisplay.classList.add('visible');
                }

                if (!res.ok) {
                    // The backend returned a 400 — invalid SQL
                    showState('error');
                    errorMsg.classList.add('error');
                    errorMsg.textContent = data.detail?.error || 'Query failed.';
                    return;
                }

                // Render results and update history
                renderTable(data.results);
                addToHistory(question, data.sql, data.row_count);

            } catch (err) {
                // Network error or server is down
                showState('error');
                errorMsg.classList.add('error');
                errorMsg.textContent = 'Could not reach the server. Is it running?';
            } finally {
                // Always restore the button
                submitBtn.disabled = false;
                submitBtn.textContent = 'RUN →';
                loadingBar.classList.remove('visible');
            }
        }

        // ── EVENT LISTENERS ──
        submitBtn.addEventListener('click', runQuery);

        // Allow Enter to submit (Shift+Enter = newline)
        queryInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                runQuery();
            }
        });

        // ── INIT ──
        checkHealth();
    </script>
</body>

</html>
